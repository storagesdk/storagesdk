# Fly.io app config for storagesdk.dev (the docs site under apps/docs).
#
# Lives at the repo root so the Fly build context is the whole
# monorepo — the Dockerfile uses the root pnpm-workspace.yaml and
# pnpm-lock.yaml for a deterministic, frozen-lockfile install.
#
# Deploy from the repo root:
#
#   fly deploy
#
# See https://fly.io/docs/reference/configuration/ for the full schema.

app = 'storagesdk'
primary_region = 'sjc'

[build]
  dockerfile = 'apps/docs/Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
