name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm check

      - name: README sync (root ↔ @storagesdk/core)
        run: diff README.md packages/core/README.md

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Build and test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start MinIO
        run: docker compose up -d minio

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null; then
              echo "MinIO is ready"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in time" >&2
          docker compose logs minio
          exit 1

      - name: Test
        run: pnpm test
        env:
          # Live Tigris tests skip themselves when these are unset (e.g. on
          # forks without secret access). Configured secrets enable them.
          TIGRIS_BUCKET: ${{ secrets.TIGRIS_BUCKET }}
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          TIGRIS_ENDPOINT: ${{ secrets.TIGRIS_ENDPOINT }}

      - name: Publint
        run: pnpm publint

      - name: Stop MinIO
        if: always()
        run: docker compose down
